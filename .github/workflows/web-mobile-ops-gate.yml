name: Web Mobile Ops Gate

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  gate:
    name: Release gate (production)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: financeflow-web-mobile
    env:
      SMOKE_BASE_URL: https://financeflow-web-mobile.vercel.app
      AUTH_EMAIL: ${{ secrets.WEB_MOBILE_AUTH_EMAIL }}
      AUTH_PASSWORD: ${{ secrets.WEB_MOBILE_AUTH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: financeflow-web-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release:gate

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-mobile-release-gate-report
          path: financeflow-web-mobile/reports/release-gate-latest.md
          if-no-files-found: warn
