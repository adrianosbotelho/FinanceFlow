name: Boundary Guard

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "macos-app/**"
      - "supabase/**"
      - "types/**"
      - "scripts/**"
      - "financeflow-web-mobile/**"
      - ".github/workflows/boundary-guard.yml"
      - ".github/workflows/web-mobile-*.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "macos-app/**"
      - "supabase/**"
      - "types/**"
      - "scripts/**"
      - "financeflow-web-mobile/**"
      - ".github/workflows/boundary-guard.yml"
      - ".github/workflows/web-mobile-*.yml"
  workflow_dispatch:

jobs:
  scope-guard:
    name: Scope Guard (desktop vs mobile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve git range
        id: range
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.base.sha }}" = "$ZERO_SHA" ]; then
              if git rev-parse "${{ github.event.pull_request.head.sha }}^" >/dev/null 2>&1; then
                echo "value=${{ github.event.pull_request.head.sha }}^...${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              else
                echo "value=" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "value=${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "$ZERO_SHA" ]; then
              if git rev-parse "${{ github.sha }}^" >/dev/null 2>&1; then
                echo "value=${{ github.sha }}^...${{ github.sha }}" >> "$GITHUB_OUTPUT"
              else
                echo "value=" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "value=${{ github.event.before }}...${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run boundary guard
        run: |
          if [ -n "${{ steps.range.outputs.value }}" ]; then
            node scripts/boundary-guard.mjs --scope auto --range "${{ steps.range.outputs.value }}"
          else
            node scripts/boundary-guard.mjs --scope auto
          fi
