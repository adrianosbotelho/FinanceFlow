name: Web Mobile CI

on:
  pull_request:
    paths:
      - "financeflow-web-mobile/**"
      - ".github/workflows/web-mobile-ci.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "financeflow-web-mobile/**"
      - ".github/workflows/web-mobile-ci.yml"
  workflow_dispatch:

jobs:
  quality:
    name: Lint + Build (web-mobile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: financeflow-web-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: financeflow-web-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
