name: Web Mobile Secret Scan

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "financeflow-web-mobile/**"
      - ".github/workflows/web-mobile-secret-scan.yml"
      - ".github/dependabot.yml"
  pull_request:
    branches:
      - main
    paths:
      - "financeflow-web-mobile/**"
      - ".github/workflows/web-mobile-secret-scan.yml"
      - ".github/dependabot.yml"
  schedule:
    - cron: "5 11 * * 1"
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

