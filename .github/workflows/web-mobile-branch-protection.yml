name: Web Mobile Branch Protection

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-mobile-branch-protection.yml"
      - ".github/workflows/boundary-guard.yml"
  workflow_dispatch:

jobs:
  protect-main:
    name: Protect main branch
    runs-on: ubuntu-latest
    env:
      REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
    steps:
      - name: Validate admin token (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' && env.REPO_ADMIN_TOKEN == '' }}
        run: |
          echo "::error::Configure o secret REPO_ADMIN_TOKEN (PAT com permissão Administration: Read and write)."
          exit 1

      - name: Skip on push when token is missing
        if: ${{ github.event_name == 'push' && env.REPO_ADMIN_TOKEN == '' }}
        run: |
          echo "::warning::REPO_ADMIN_TOKEN ausente. Pulando aplicação automática da branch protection no push."
          echo "::notice::Para aplicar as regras automaticamente, configure o secret REPO_ADMIN_TOKEN e rode workflow_dispatch."

      - name: Apply protection rules
        if: ${{ env.REPO_ADMIN_TOKEN != '' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.REPO_ADMIN_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const branch = "main";
            await github.request("PUT /repos/{owner}/{repo}/branches/{branch}/protection", {
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts: [
                  "Boundary Guard / Scope Guard (desktop vs mobile)",
                  "Web Mobile CI / Lint + Build (web-mobile)",
                  "Web Mobile Secret Scan / gitleaks",
                  "Web Mobile CodeQL / Analyze (javascript-typescript)"
                ]
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                required_approving_review_count: 0
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: true,
              lock_branch: false,
              allow_fork_syncing: true
            });
            core.notice("Branch protection aplicada em main com checks obrigatórios do web-mobile.");
